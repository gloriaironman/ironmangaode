function tierOf(city){
  if(DATA.tiers.T0.includes(city)) return 'T0';
  if(DATA.tiers.T1.includes(city)) return 'T1';
  if(DATA.tiers.T2.includes(city)) return 'T2';
  return 'other';
}
function tierPill(city){
  const t = tierOf(city);
  const label = t==='other' ? '其他城市' : t + ' 城市';
  return '<span class="tier-pill tier-'+t+'">'+label+'</span>';
}
function fmtPrice(p){ return Number(p).toLocaleString('zh-CN'); }
function catDisplay(cat){ return cat.replace(/;/g,' / '); }

const cityDL = document.getElementById('city-list');
cityDL.innerHTML = DATA.cities.map(c=>'<option value="'+c+'">').join('');
document.getElementById('top-cat-list').innerHTML =
  DATA.top.categories.map(c=>'<option value="'+catDisplay(c.cat)+'">').join('');
document.getElementById('d-cat-list').innerHTML =
  DATA.diamond.categories.map(c=>'<option value="'+catDisplay(c.cat)+'">').join('');

const topCatByDisp = {}; DATA.top.categories.forEach(c=>topCatByDisp[catDisplay(c.cat)]=c);
const dCatByDisp = {};  DATA.diamond.categories.forEach(c=>dCatByDisp[catDisplay(c.cat)]=c);
const cityIdx = {}; DATA.cities.forEach((c,i)=>cityIdx[c]=i);

function renderTop(){
  const city = document.getElementById('top-city').value.trim();
  const catDisp = document.getElementById('top-cat').value.trim();
  const box = document.getElementById('top-result');
  if(!city && !catDisp){ box.classList.remove('show'); box.innerHTML=''; return; }
  box.classList.add('show');
  const cat = topCatByDisp[catDisp];
  if(!city || cityIdx[city]===undefined){ box.innerHTML='<div class="empty">请输入有效的城市名称。</div>'; return; }
  if(!cat){ box.innerHTML='<div class="empty">请选择有效的顶展类目。</div>'; return; }
  const price = (DATA.top.prices[cat.id]||{})[cityIdx[city]];
  let html='';
  if(price===undefined){
    html += '<div class="price-box"><span class="price-label">'+city+' · '+catDisplay(cat.cat)+'</span>'
      + '<span class="price-value" style="font-size:20px;color:#8a9099;">该城市不可售卖</span>'+tierPill(city)+'</div>'
      + '<div class="meta">搜索词PV在该城市可能低于1000/月，未开放售卖。</div>';
  } else {
    html += '<div class="price-box"><span class="price-label">'+city+' · '+catDisplay(cat.cat)+'</span>'
      + '<span class="price-value">¥'+fmtPrice(price)+'</span><span class="price-unit">/ 月</span>'+tierPill(city)+'</div>';
    html += '<div class="meta">品广行业ID：<b>'+cat.id+'</b>';
    if(cat.maxDist!=='' && cat.maxDist!=null) html += ' &nbsp;·&nbsp; 最大置顶距离：<b>'+cat.maxDist+'</b>';
    html += '</div>';
  }
  if(cat.words && cat.words.length){
    html += '<div class="words-title">词包内关键词 <span class="count">共 '+cat.words.length+' 个</span></div>';
    html += '<div class="words">'+cat.words.map(w=>'<span class="word-chip">'+w+'</span>').join('')+'</div>';
  } else {
    html += '<div class="words-title">词包内关键词</div><div class="empty">该类目暂无词包数据。</div>';
  }
  box.innerHTML = html;
}
