function fmt(n){if(n==null||isNaN(n))return'-';if(n>=10000)return(n/10000).toFixed(2)+'万';return n.toFixed(2)}
function fmtI(n){if(n==null||isNaN(n))return'-';if(n>=10000)return(n/10000).toFixed(1)+'万';return n.toLocaleString()}

function renderDiagnosis(){
  var totalCost=0,totalShops=0,companySet={},monthCost={},monthShops={};
  OVERVIEW_DATA.forEach(function(r){
    totalCost+=r.c;totalShops+=r.s;companySet[r.n]=true;
    if(!monthCost[r.m]){monthCost[r.m]=0;monthShops[r.m]=0}
    monthCost[r.m]+=r.c;monthShops[r.m]+=r.s;
  });
  var avgArpu=totalShops>0?(totalCost/totalShops).toFixed(2):0;
  var companyCount=Object.keys(companySet).length;

  var cardSummary='';
  MONTHS.forEach(function(m,i){
    cardSummary+=(i>0?' | ':'')+MONTH_LABEL[m]+': '+fmt(monthCost[m]||0);
  });
  var shopsSummary='';
  MONTHS.forEach(function(m,i){
    shopsSummary+=(i>0?' | ':'')+MONTH_LABEL[m]+': '+fmtI(monthShops[m]||0);
  });

  document.getElementById('summary-cards').innerHTML=
    '<div class="card"><div class="label">总消耗</div><div class="value blue">'+fmt(totalCost)+'</div><div class="sub">'+cardSummary+'</div></div>'+
    '<div class="card"><div class="label">服务商数量</div><div class="value green">'+companyCount+'</div><div class="sub">有投放记录的服务商</div></div>'+
    '<div class="card"><div class="label">总在投门店次</div><div class="value orange">'+fmtI(totalShops)+'</div><div class="sub">'+shopsSummary+'</div></div>'+
    '<div class="card"><div class="label">整体ARPU</div><div class="value">'+avgArpu+'</div><div class="sub">元/门店（消耗/在投门店数）</div></div>';

  // Insights
  var insight='<h4>数据洞察</h4><p>';
  if(MONTHS.length>=2){
    var last=MONTHS[MONTHS.length-1],prev=MONTHS[MONTHS.length-2];
    var lc=monthCost[last]||0,pc=monthCost[prev]||0;
    var ls=monthShops[last]||0,ps=monthShops[prev]||0;
    var la=ls>0?lc/ls:0,pa=ps>0?pc/ps:0;
    var cc=pc>0?((lc/pc-1)*100).toFixed(1):0;
    var ac=pa>0?((la/pa-1)*100).toFixed(1):0;
    insight+='<b>1. 整体趋势：</b>'+MONTH_LABEL[last]+'消耗'+fmt(lc)+'，较'+MONTH_LABEL[prev]+fmt(pc)+(cc>0?'增长':'下降')+'<b>'+Math.abs(cc)+'%</b>。'+
      MONTH_LABEL[last]+'整体ARPU为'+la.toFixed(2)+'元/店，较'+MONTH_LABEL[prev]+pa.toFixed(2)+'元/店'+(ac>0?'提升':'下降')+'<b>'+Math.abs(ac)+'%</b>。<br>';
    var lastData=OVERVIEW_DATA.filter(function(r){return r.m===last});
    var prevData=OVERVIEW_DATA.filter(function(r){return r.m===prev});
    var prevMap={};prevData.forEach(function(r){prevMap[r.n]=r});
    var growers=[];
    lastData.forEach(function(r){
      if(prevMap[r.n]&&prevMap[r.n].c>10000){growers.push({name:r.n,change:r.c/prevMap[r.n].c-1,cost:r.c})}
    });
    growers.sort(function(a,b){return b.change-a.change});
    var top10s=0;lastData.slice(0,10).forEach(function(r){top10s+=r.c});
    insight+='<b>2. 头部集中：</b>Top 10服务商贡献了约'+(lc>0?(top10s/lc*100).toFixed(1):0)+'%的'+MONTH_LABEL[last]+'消耗。<br>'+
      '<b>3. 增长最快：</b>'+growers.slice(0,3).map(function(g){return g.name+'(+'+(g.change*100).toFixed(0)+'%)'}).join('、')+'。<br>';
  }
  insight+='<b>'+(MONTHS.length>=2?'4':'1')+'. 数据说明：</b>本看板数据自动更新，每日9:00刷新，数据范围取决于ODPS表分区（最近约90天）。</p>';
  document.getElementById('insight-box').innerHTML=insight;

  // Top 10 chart
  var combined={};
  OVERVIEW_DATA.forEach(function(r){if(!combined[r.n])combined[r.n]={c:0,s:0};combined[r.n].c+=r.c;combined[r.n].s+=r.s});
  var topList=Object.keys(combined).map(function(n){return{n:n,c:combined[n].c}});
  topList.sort(function(a,b){return b.c-a.c});
  var maxC=topList[0]?topList[0].c:1;
  var h='';
  for(var i=0;i<Math.min(10,topList.length);i++){var r=topList[i];var w=Math.max(2,r.c/maxC*100);
    h+='<div class="bar-row"><div class="bar-label" title="'+r.n+'">'+r.n+'</div><div class="bar-fill" style="width:'+w+'%"></div><div class="bar-value">'+fmt(r.c)+'</div></div>'}
  document.getElementById('top-chart').innerHTML=h;

  // Tag chart
  var tagT={};
  BENCHMARK_DATA.forEach(function(r){if(!tagT[r.t])tagT[r.t]={c:0,s:0};tagT[r.t].c+=r.c;tagT[r.t].s+=r.s});
  var tagL=Object.keys(tagT).map(function(t){return{t:t,c:tagT[t].c}});
  tagL.sort(function(a,b){return b.c-a.c});
  var mxC=tagL[0]?tagL[0].c:1;
  h='';
  for(var i=0;i<Math.min(10,tagL.length);i++){var r=tagL[i];var w=Math.max(2,r.c/mxC*100);
    h+='<div class="bar-row"><div class="bar-label" title="'+r.t+'">'+r.t+'</div><div class="bar-fill" style="width:'+w+'%;background:linear-gradient(90deg,#722ed1,#b37feb)"></div><div class="bar-value">'+fmt(r.c)+'</div></div>'}
  document.getElementById('tag-chart').innerHTML=h;

  // Month compare
  h='';
  MONTHS.forEach(function(m){
    var c=monthCost[m]||0,s=monthShops[m]||0,a=s>0?c/s:0;
    h+='<div style="display:flex;gap:24px;margin-bottom:16px;padding:12px 16px;background:#fafafa;border-radius:8px">'+
      '<div style="flex:1"><div style="font-size:13px;color:#999">'+MONTH_LABEL[m]+'</div><div style="font-size:20px;font-weight:700;color:#1890ff;margin-top:4px">'+fmt(c)+'</div></div>'+
      '<div style="flex:1"><div style="font-size:13px;color:#999">在投门店次</div><div style="font-size:20px;font-weight:700;color:#52c41a;margin-top:4px">'+fmtI(s)+'</div></div>'+
      '<div style="flex:1"><div style="font-size:13px;color:#999">ARPU</div><div style="font-size:20px;font-weight:700;color:#fa8c16;margin-top:4px">'+a.toFixed(2)+'</div></div></div>';
  });
  document.getElementById('month-compare').innerHTML=h;

  // ARPU top 10
  var arpuL=OVERVIEW_DATA.filter(function(r){return r.c>50000});
  arpuL.sort(function(a,b){return b.a-a.a});
  var amx=arpuL[0]?arpuL[0].a:1;
  h='';
  for(var i=0;i<Math.min(10,arpuL.length);i++){var r=arpuL[i];var w=Math.max(2,r.a/amx*100);
    h+='<div class="bar-row"><div class="bar-label" title="'+r.n+'">'+r.n+'</div><div class="bar-fill" style="width:'+w+'%;background:linear-gradient(90deg,#fa8c16,#ffc53f)"></div><div class="bar-value">'+r.a.toFixed(2)+'</div></div>'}
  document.getElementById('arpu-chart').innerHTML=h;
}

var overviewPage=1,overviewPageSize=50;
function renderOverview(){
  var month=document.getElementById('overview-month').value;
  var search=document.getElementById('overview-search').value.toLowerCase();
  var sort=document.getElementById('overview-sort').value;
  var data=OVERVIEW_DATA.filter(function(r){return r.m===month});
  if(search)data=data.filter(function(r){return r.n.toLowerCase().indexOf(search)>=0});
  if(sort==='cost')data.sort(function(a,b){return b.c-a.c});
  else if(sort==='arpu')data.sort(function(a,b){return b.a-a.a});
  else data.sort(function(a,b){return a.n.localeCompare(b.n,'zh-CN')});
  var totalPages=Math.ceil(data.length/overviewPageSize)||1;
  if(overviewPage>totalPages)overviewPage=totalPages;
  if(overviewPage<1)overviewPage=1;
  var start=(overviewPage-1)*overviewPageSize;
  var pageData=data.slice(start,start+overviewPageSize);

  // Previous month for MoM
  var mIdx=MONTHS.indexOf(month);
  var prevMonth=mIdx>0?MONTHS[mIdx-1]:null;
  var prevMap={};
  if(prevMonth)OVERVIEW_DATA.filter(function(r){return r.m===prevMonth}).forEach(function(r){prevMap[r.n]=r});

  var html='';
  pageData.forEach(function(r,i){
    var rank=start+i+1;
    var rc=rank<=3?'rank-'+rank:'rank-n';
    var mom='-';
    if(prevMap[r.n]){var ch=((r.c-prevMap[r.n].c)/prevMap[r.n].c*100);var cls=ch>0?'tag-up':ch<0?'tag-down':'tag-neutral';
      mom='<span class="tag '+cls+'">'+(ch>0?'+':'')+ch.toFixed(1)+'%</span>'}
    html+='<tr><td><span class="rank '+rc+'">'+rank+'</span></td><td>'+r.n+'</td><td class="num">'+fmt(r.c)+'</td><td class="num">'+fmtI(r.s)+'</td><td class="num">'+r.a.toFixed(2)+'</td><td class="num">'+mom+'</td></tr>';
  });
  if(!pageData.length)html='<tr><td colspan="6" class="empty">暂无数据</td></tr>';
  document.getElementById('overview-body').innerHTML=html;
  document.getElementById('overview-pagination').innerHTML=
    '<button '+(overviewPage<=1?'disabled':'')+' onclick="overviewPage--;renderOverview()">上一页</button>'+
    '<span class="page-info">第 '+overviewPage+' / '+totalPages+' 页（共 '+data.length+' 条）</span>'+
    '<button '+(overviewPage>=totalPages?'disabled':'')+' onclick="overviewPage++;renderOverview()">下一页</button>';
}

function renderDetail(){
  var company=document.getElementById('detail-company').value;
  var month=document.getElementById('detail-month').value;
  var detailData=DDM[month]||[];
  var bmMonth=BENCHMARK_DATA.filter(function(r){return r.m===month});
  var bmMap={};bmMonth.forEach(function(r){bmMap[r.t]=r.a});
  if(!company){document.getElementById('detail-body').innerHTML='<tr><td colspan="6" class="empty">请选择服务商</td></tr>';
    document.getElementById('detail-summary').innerHTML='';return}
  var data=detailData.filter(function(r){return r.c===company});
  data.sort(function(a,b){return b.cost-a.cost});
  var tc=0,ts=0,html='';
  data.forEach(function(r){
    tc+=r.cost;ts+=r.shops;
    var ba=bmMap[r.t]||0;var d=ba>0?((r.arpu-ba)/ba*100):0;
    var cls=d>0?'tag-up':d<0?'tag-down':'tag-neutral';
    var ds=ba>0?('<span class="tag '+cls+'">'+(d>0?'+':'')+d.toFixed(1)+'%</span>'):'-';
    html+='<tr><td>'+r.t+'</td><td class="num">'+fmt(r.cost)+'</td><td class="num">'+fmtI(r.shops)+'</td><td class="num">'+r.arpu.toFixed(2)+'</td><td class="num">'+ba.toFixed(2)+'</td><td class="num">'+ds+'</td></tr>';
  });
  if(!data.length)html='<tr><td colspan="6" class="empty">该服务商暂无明细数据</td></tr>';
  document.getElementById('detail-body').innerHTML=html;
  var ta=ts>0?tc/ts:0;
  document.getElementById('detail-summary').innerHTML='<b>'+company+'</b> '+MONTH_LABEL[month]+'汇总：消耗 <b>'+fmt(tc)+'</b>，在投门店次 <b>'+fmtI(ts)+'</b>，ARPU <b>'+ta.toFixed(2)+'</b> 元/店';
}

function init(){
  var ms1=document.getElementById('overview-month'),ms2=document.getElementById('detail-month');
  MONTHS.forEach(function(m){ms1.innerHTML+='<option value="'+m+'">'+MONTH_LABEL[m]+'</option>';ms2.innerHTML+='<option value="'+m+'">'+MONTH_LABEL[m]+'</option>'});
  ms1.value=MONTHS[MONTHS.length-1];ms2.value=MONTHS[MONTHS.length-1];
  var comps={};OVERVIEW_DATA.forEach(function(r){comps[r.n]=true});
  var cl=Object.keys(comps).sort(function(a,b){return a.localeCompare(b,'zh-CN')});
  var cs=document.getElementById('detail-company');
  cs.innerHTML='<option value="">-- 请选择服务商 --</option>';
  cl.forEach(function(c){cs.innerHTML+='<option value="'+c+'">'+c+'</option>'});
  ms1.addEventListener('change',function(){overviewPage=1;renderOverview()});
  document.getElementById('overview-search').addEventListener('input',function(){overviewPage=1;renderOverview()});
  document.getElementById('overview-sort').addEventListener('change',function(){overviewPage=1;renderOverview()});
  ms2.addEventListener('change',renderDetail);
  cs.addEventListener('change',renderDetail);
  renderDiagnosis();renderOverview();
}
init();
</script>
</body>
</html>
